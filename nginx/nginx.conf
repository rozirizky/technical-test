events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream api_gateway {
        server api-gateway:8000;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # API routes → api-gateway
        location /api/ {
            proxy_pass http://api_gateway;
        }

        location /users/      { proxy_pass http://api_gateway; }
        location /role/       { proxy_pass http://api_gateway; }
        location /location/   { proxy_pass http://api_gateway; }
        location /vehicles/   { proxy_pass http://api_gateway; }
        location /drivers/    { proxy_pass http://api_gateway; }
        location /bookings/   { proxy_pass http://api_gateway; }
        location /fuel-logs/  { proxy_pass http://api_gateway; }
        location /service-schedules/  { proxy_pass http://api_gateway; }
        location /service-histories/  { proxy_pass http://api_gateway; }
        location /usage-logs/ { proxy_pass http://api_gateway; }
        location /health      { proxy_pass http://api_gateway; }

        # Frontend → Vue app
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
