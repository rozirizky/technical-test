version: '3.9'

networks:
  kendaraan-net:
    driver: bridge

volumes:
  user_db_data:
  vehicle_db_data:
  booking_db_data:
  operational_db_data:
  redis_data:

services:

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kendaraan_redis
    volumes:
      - redis_data:/data
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (user) ─────────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    container_name: kendaraan_user_db
    environment:
      POSTGRES_DB: peminjaman_kendaraan
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d peminjaman_kendaraan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (vehicle) ──────────────────────────────────────
  vehicle-db:
    image: postgres:16-alpine
    container_name: kendaraan_vehicle_db
    environment:
      POSTGRES_DB: peminjaman_kendaraan
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vehicle_db_data:/var/lib/postgresql/data
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d peminjaman_kendaraan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (booking) ──────────────────────────────────────
  booking-db:
    image: postgres:16-alpine
    container_name: kendaraan_booking_db
    environment:
      POSTGRES_DB: peminjaman_kendaraan
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d peminjaman_kendaraan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (operational) ──────────────────────────────────
  operational-db:
    image: postgres:16-alpine
    container_name: kendaraan_operational_db
    environment:
      POSTGRES_DB: peminjaman_kendaraan
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - operational_db_data:/var/lib/postgresql/data
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d peminjaman_kendaraan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── User Service ──────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: kendaraan_user_svc
    environment:
      DATABASE_URL: postgresql+asyncpg://airflow:${DB_PASSWORD}@user-db:5432/peminjaman_kendaraan
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Vehicle Service ───────────────────────────────────────────
  vehicle-service:
    build:
      context: ./services/vehicle_service
      dockerfile: Dockerfile
    container_name: kendaraan_vehicle_svc
    environment:
      DATABASE_URL: postgresql+asyncpg://airflow:${DB_PASSWORD}@vehicle-db:5432/peminjaman_kendaraan
    depends_on:
      vehicle-db:
        condition: service_healthy
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Booking Service ───────────────────────────────────────────
  booking-service:
    build:
      context: ./services/booking_service
      dockerfile: Dockerfile
    container_name: kendaraan_booking_svc
    environment:
      DATABASE_URL: postgresql+asyncpg://airflow:${DB_PASSWORD}@booking-db:5432/peminjaman_kendaraan
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      USER_SERVICE_URL: http://user-service:8000
      VEHICLE_SERVICE_URL: http://vehicle-service:8000
      APPROVAL_LEVELS: 2
    depends_on:
      booking-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      vehicle-service:
        condition: service_healthy
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Operational Service ───────────────────────────────────────
  operational-service:
    build:
      context: ./services/operational_service
      dockerfile: Dockerfile
    container_name: kendaraan_operational_svc
    environment:
      DATABASE_URL: postgresql+asyncpg://airflow:${DB_PASSWORD}@operational-db:5432/peminjaman_kendaraan
    depends_on:
      operational-db:
        condition: service_healthy
    networks:
      - kendaraan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: kendaraan_api_gateway
    networks:
      - kendaraan-net
    depends_on:
      user-service:
        condition: service_healthy
      vehicle-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Frontend (Vue 3 + Vite) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kendaraan_frontend
    networks:
      - kendaraan-net
    restart: unless-stopped

  # ── Nginx (Reverse Proxy + Static Files) ─────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kendaraan_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - kendaraan-net
    restart: unless-stopped
